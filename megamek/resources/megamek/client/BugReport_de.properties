title=Fehlerbericht erstellen
mainText=Wir arbeiten ständig daran, die Programme der MegaMek-Suite zu verbessern und Fehler zu beseitigen. Da die Developer daran in ihrer Freizeit arbeiten, haben wir keine Möglichkeiten für weitreichende Tests. Das Projekt ist daher auf die Mithilfe der Spieler angewiesen, was das Auffinden und Notieren von Fehlern angeht. Wenn du dabei mithelfen möchtest und einen Fehler gefunden hast, dann mache Folgendes:</p><blockquote><b> 1)</b> Speichere deinen Spielstand, die Campaign oder die Einheit, die du bearbeitest. Erstelle am besten eine gezippte Version, damit du sie zum Fehlerbericht hochladen kannst.<br/><b> 2)</b> Optional - Wenn du schon auf unserem Discord bist, kannst du dort fragen, ob es dazu schon einen Fehlerbericht gibt und dir so eventuell das Erstellen sparen. Doppelte Reports sind aber auch völlig ok. <br/><b> 3)</b> Mit dem untenstehenden Button kommst du zu der Webseite für die Erstellung eines Fehlerberichts für den jeweiligen Programmteil (du brauchst dafür aber einen Github Account). Wähle "Report an issue".<br/><b> 4)</b> Füll das Formular für den Fehlerbericht (issue report) aus und füge die gezippten Dateien zu.</blockquote>
secondaryText=<h3 style="text-align:center">Wohin gehört der Fehler?</h3> <ul> <li>Mein Fehler ist in einem Szenario aufgetreten (also in einem Kampf): <b>MegaMek</b> (bei einem aus MekHQ gestarteten Szenario wäre es gut, einen gespeicherten Stand der Campaign beizufügen) <li>Mein Fehler ist beim Konstruieren oder Anpassen einer Einheit aufgetreten: <b>MegaMekLab</b> <li>Mein Fehler ist beim Campaign-Management aufgetreten: <b>MekHQ</b> <li>Ich glaube, Daten zu einer Einheit, einem Planeten oder etwas anderem sind falsch: <b>Data</b> <li>Weiß nicht genau: <b>MegaMek</b> (ist nicht so wichtig, wo es hingehört) </ul>
discord.text=Unserem Discord beitreten
